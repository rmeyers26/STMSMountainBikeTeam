<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Race results for STMS Mountain Bike Team." />
  <meta name="theme-color" content="#1B3D2F" />
  <title>Race Results - STMS Mountain Bike Team</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/jpeg" href="images/logo.jpg" />
  <style>
    body { background: #0f172a; color: #f8fafc; }

    .res-header {
      background: #1B3D2F;
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .res-header-brand { display: flex; align-items: center; gap: 0.6rem; }
    .res-header-brand img { height: 36px; width: 36px; border-radius: 50%; object-fit: cover; }
    .res-header-title { font-size: 1.15rem; font-weight: 800; color: #fff; }
    .res-header-sub   { font-size: 0.8rem; color: #cde8da; }
    .res-header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    .status-pill {
      display: inline-block; padding: 0.15rem 0.55rem;
      border-radius: 999px; font-size: 0.72rem; font-weight: 700;
    }
    .pill-finished { background: #1d4ed8; color: #fff; }
    .pill-racing   { background: #16a34a; color: #fff; }
    .pill-dnf      { background: #7f1d1d; color: #fca5a5; }
    .pill-dns      { background: #1e293b; color: #64748b; border: 1px solid #334155; }

    .res-container { max-width: 960px; margin: 0 auto; padding: 1rem; }

    .res-toolbar {
      display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
      margin-bottom: 1rem;
    }
    .res-toolbar select {
      padding: 0.5rem 0.75rem; border-radius: 8px;
      border: 1px solid #334155; background: #1e293b; color: #f8fafc;
      font-size: 0.9rem;
    }
    .btn-export {
      padding: 0.5rem 1rem; border-radius: 8px;
      background: #16a34a; color: #fff; border: none;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .btn-export:hover { background: #15803d; }

    .res-table { width: 100%; border-collapse: collapse; }
    .res-table th {
      text-align: left; font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.06em; color: #64748b; padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #1e293b;
    }
    .res-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    .res-table tbody tr:hover { background: #1e293b; }

    .pos-cell { font-weight: 800; font-size: 1.1rem; color: #94a3b8; width: 40px; }
    .pos-1 { color: #fbbf24; }
    .pos-2 { color: #94a3b8; }
    .pos-3 { color: #b45309; }

    .name-cell { font-weight: 600; font-size: 1rem; color: #f8fafc; }
    .cat-cell  { font-size: 0.82rem; color: #64748b; }
    .laps-cell { font-weight: 800; color: #34d399; text-align: right; }
    .time-cell { font-size: 0.95rem; color: #cbd5e1; text-align: right; font-variant-numeric: tabular-nums; }
    .gap-cell  { font-size: 0.85rem; color: #64748b; text-align: right; font-variant-numeric: tabular-nums; }

    #page-msg { text-align: center; padding: 3rem; color: #64748b; }

    /* Event picker */
    .ev-picker { max-width: 480px; margin: 4rem auto; text-align: center; }
    .ev-picker h2 { color: #f8fafc; margin-bottom: 1rem; }
    .ev-picker select { width: 100%; padding: 0.65rem; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #f8fafc; font-size: 1rem; margin-bottom: 1rem; }
    .ev-picker .btn { width: 100%; }
  </style>
</head>
<body>
  <div class="res-header">
    <div class="res-header-brand">
      <img src="images/logo.jpg" alt="STMS logo" />
      <div>
        <div class="res-header-title" id="event-title">Race Results</div>
        <div class="res-header-sub" id="event-date-sub">STMS Mountain Bike Team</div>
      </div>
    </div>
    <div class="res-header-right">
      <a href="leaderboard.html" id="lb-link" style="color:#cde8da;font-size:0.85rem;text-decoration:none;">🏆 Leaderboard</a>
      <a href="admin-events.html" style="color:#cde8da;font-size:0.85rem;text-decoration:none;">📅 Events</a>
    </div>
  </div>

  <div id="page-msg">Loading…</div>

  <!-- Event picker -->
  <div id="event-picker" style="display:none;">
    <div class="ev-picker">
      <h2>Select Event</h2>
      <select id="event-select"><option value="">Choose event…</option></select>
      <button id="btn-go" class="btn btn-primary">View Results →</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-ui" style="display:none;">
    <div class="res-container">
      <div class="res-toolbar">
        <select id="cat-filter" aria-label="Filter by category">
          <option value="">All Categories</option>
        </select>
        <button id="btn-csv" class="btn-export">⬇ Download CSV</button>
      </div>
      <table class="res-table">
        <thead>
          <tr>
            <th style="width:40px;">#</th>
            <th>Rider</th>
            <th>Category</th>
            <th style="text-align:right;">Laps</th>
            <th style="text-align:right;">Time</th>
            <th style="text-align:right;">Gap</th>
            <th style="text-align:right;">Status</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <p id="no-data" style="text-align:center;color:#64748b;padding:2rem;display:none;">No results yet.</p>
    </div>
  </div>

  <script>
    (function () {
      var eventId      = null;
      var allStandings = [];
      var eventData    = null;

      function escHtml(v) {
        return String(v == null ? '' : v)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      function pad(n) { return n < 10 ? '0' + n : String(n); }

      function formatMs(ms) {
        if (ms === null || ms === undefined || isNaN(ms) || ms < 0) return '';
        var totalSec = Math.floor(ms / 1000);
        var h = Math.floor(totalSec / 3600);
        var m = Math.floor((totalSec % 3600) / 60);
        var s = totalSec % 60;
        if (h > 0) return h + ':' + pad(m) + ':' + pad(s);
        return pad(m) + ':' + pad(s);
      }

      function formatGap(ms) {
        if (!ms || ms === 0) return '';
        return '+' + formatMs(ms);
      }

      function showMsg(msg) {
        document.getElementById('page-msg').style.display = '';
        document.getElementById('page-msg').textContent = msg;
        document.getElementById('results-ui').style.display = 'none';
        document.getElementById('event-picker').style.display = 'none';
      }

      // ── Category filter ───────────────────────────────────────────────────────
      document.getElementById('cat-filter').addEventListener('change', renderTable);

      // ── Render table ──────────────────────────────────────────────────────────
      function renderTable() {
        var catFilter = document.getElementById('cat-filter').value;
        var filtered = allStandings.filter(function (r) {
          return !catFilter || r.category === catFilter;
        });

        var tbody = document.getElementById('results-body');
        var noData = document.getElementById('no-data');

        if (!filtered.length) { tbody.innerHTML = ''; noData.style.display = ''; return; }
        noData.style.display = 'none';

        tbody.innerHTML = filtered.map(function (r) {
          var posClass = r.position <= 3 ? ' pos-' + r.position : '';
          var statusPill = '';
          if (r.is_finish)        statusPill = '<span class="status-pill pill-finished">Finished</span>';
          else if (r.status === 'racing') statusPill = '<span class="status-pill pill-racing">Racing</span>';
          else if (r.status === 'DNF')    statusPill = '<span class="status-pill pill-dnf">DNF</span>';
          else                             statusPill = '<span class="status-pill pill-dns">DNS</span>';

          return '<tr>'
            + '<td class="pos-cell' + posClass + '">' + r.position + '</td>'
            + '<td class="name-cell">' + escHtml(r.first_name + ' ' + r.last_name) + '</td>'
            + '<td class="cat-cell">'  + escHtml(r.category) + '</td>'
            + '<td class="laps-cell">' + r.lap_count + '</td>'
            + '<td class="time-cell">' + (r.total_ms !== null ? formatMs(r.total_ms) : '—') + '</td>'
            + '<td class="gap-cell">'  + (r.gap_ms ? formatGap(r.gap_ms) : '—') + '</td>'
            + '<td style="text-align:right;">' + statusPill + '</td>'
            + '</tr>';
        }).join('');
      }

      // ── CSV export ────────────────────────────────────────────────────────────
      document.getElementById('btn-csv').addEventListener('click', function () {
        var catFilter = document.getElementById('cat-filter').value;
        var filtered = allStandings.filter(function (r) {
          return !catFilter || r.category === catFilter;
        });

        var headers = ['Position', 'First Name', 'Last Name', 'Category', 'Laps', 'Total Time', 'Gap', 'Status'];
        var rows = filtered.map(function (r) {
          return [
            r.position,
            r.first_name,
            r.last_name,
            r.category,
            r.lap_count,
            r.total_ms !== null ? formatMs(r.total_ms) : '',
            r.gap_ms ? formatGap(r.gap_ms) : '',
            r.is_finish ? 'Finished' : r.status
          ].map(function (cell) {
            var s = String(cell == null ? '' : cell);
            if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
              s = '"' + s.replace(/"/g, '""') + '"';
            }
            return s;
          }).join(',');
        });

        var csvContent = [headers.join(',')].concat(rows).join('\n');
        var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        var url  = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = (eventData ? eventData.name.replace(/[^a-z0-9]/gi, '_') : 'race') + '_results.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      });

      // ── Fetch results ─────────────────────────────────────────────────────────
      function fetchResults() {
        return fetch('/.netlify/functions/leaderboard?event_id=' + eventId)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (!data.ok) throw new Error(data.error || 'Failed to load results.');

            eventData    = data.event;
            allStandings = data.standings || [];

            document.getElementById('event-title').textContent = eventData.name;

            var dateStr = eventData.event_date
              ? new Date(eventData.event_date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })
              : '';
            document.getElementById('event-date-sub').textContent = dateStr || 'STMS Mountain Bike Team';

            var lbLink = 'leaderboard.html?event_id=' + eventId;
            document.getElementById('lb-link').href = lbLink;

            // Populate category filter
            var cats = {};
            allStandings.forEach(function (r) { if (r.category) cats[r.category] = true; });
            var catSel = document.getElementById('cat-filter');
            var current = catSel.value;
            catSel.innerHTML = '<option value="">All Categories</option>';
            Object.keys(cats).sort().forEach(function (c) {
              var opt = document.createElement('option');
              opt.value = c; opt.textContent = c;
              catSel.appendChild(opt);
            });
            catSel.value = current;

            renderTable();
          });
      }

      // ── Event picker ──────────────────────────────────────────────────────────
      function loadEventPicker() {
        showMsg('Loading events…');
        fetch('/.netlify/functions/admin-events', { headers: { 'Authorization': 'Bearer ' } })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var events = (data.events || []);
            if (!events.length) { showMsg('No events found.'); return; }
            var sel = document.getElementById('event-select');
            events.forEach(function (ev) {
              var opt = document.createElement('option');
              opt.value = ev.id;
              opt.textContent = ev.name + ' (' + ev.status + ')';
              sel.appendChild(opt);
            });
            document.getElementById('page-msg').style.display = 'none';
            document.getElementById('event-picker').style.display = '';
          })
          .catch(function () { showMsg('Could not load events. Add ?event_id=X to the URL.'); });
      }

      document.getElementById('btn-go').addEventListener('click', function () {
        var val = document.getElementById('event-select').value;
        if (!val) { alert('Please select an event.'); return; }
        window.location.href = 'results.html?event_id=' + val;
      });

      // ── Init ──────────────────────────────────────────────────────────────────
      var params = new URLSearchParams(window.location.search);
      eventId = parseInt(params.get('event_id'), 10);

      if (!eventId || isNaN(eventId)) {
        loadEventPicker();
      } else {
        fetchResults().then(function () {
          document.getElementById('page-msg').style.display = 'none';
          document.getElementById('results-ui').style.display = '';
        }).catch(function (err) {
          showMsg('Error: ' + (err.message || 'Could not load results.'));
        });
      }

    })();
  </script>
</body>
</html>
